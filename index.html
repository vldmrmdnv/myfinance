function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmt(n){ return (+n).toLocaleString("uk-UA",{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── Firebase sync ──────────────────────────────────────────
async function saveToCloud() {
  if (!uid) return;
  try {
    await setDoc(doc(db, "users", uid), {
      expenses: state.expenses,
      incomes: state.incomes,
      expCats: state.expCats,
      incCats: state.incCats,
      monoAccount: state.monoAccount,
      monoLastSync: state.monoLastSync,
      monoAccounts: state.monoAccounts,
      updatedAt: Date.now()
    });
  } catch(e) { console.error("Cloud save error:", e); }
}

function subscribeToCloud() {
  if (unsub) unsub();
  unsub = onSnapshot(doc(db, "users", uid), (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      state.expenses = d.expenses || [];
      state.incomes = d.incomes || [];
      state.expCats = d.expCats || state.expCats;
      state.incCats = d.incCats || state.incCats;
      state.monoAccount = d.monoAccount || "";
      state.monoLastSync = d.monoLastSync || 0;
      state.monoAccounts = d.monoAccounts || [];
      // monoToken зберігаємо тільки локально
      state.monoToken = localStorage.getItem("mono_token_"+uid) || "";
      render();
    }
  });
}

function saveMonoToken() {
  if (uid) localStorage.setItem("mono_token_"+uid, state.monoToken);
}

// ── Auth ───────────────────────────────────────────────────
window.loginGoogle = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) { toast("Помилка входу: "+e.message); }
};

window.logout = async () => {
  if (unsub) unsub();
  await signOut(auth);
  uid = null;
  state.tab = "dashboard";
  render();
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    state.monoToken = localStorage.getItem("mono_token_"+uid) || "";
    subscribeToCloud();
  } else {
    uid = null;
    if (unsub) unsub();
    render();
  }
});

// ── Monobank API ───────────────────────────────────────────
window.loadAccounts = async () => {
  if (!state.monoToken) { toast("Введи токен Monobank"); return; }
  state.syncStatus="loading"; state.syncMsg="Завантаження рахунків..."; render();
  try {
    const r = await fetch("https://api.monobank.ua/personal/client-info", {
      headers:{"X-Token": state.monoToken}
    });
    if (!r.ok) throw new Error("Невірний токен");
    const info = await r.json();
    state.monoAccounts = info.accounts.map(a => ({
      id: a.id,
      label: `${a.type==="black"?"⚫ Чорна":"💳 "+a.type} — ₴${fmt(a.balance/100)}`
    }));
    if (!state.monoAccount && state.monoAccounts.length)
      state.monoAccount = state.monoAccounts[0].id;
    saveMonoToken();
    await saveToCloud();
    state.syncStatus="ok"; state.syncMsg="✅ Рахунки завантажено";
    render();
  } catch(e) {
    state.syncStatus="err"; state.syncMsg="❌ "+e.message; render();
  }
};

window.syncMono = async () => {
  if (!state.monoToken) { toast("Введи токен"); return; }
  if (!state.monoAccount) { toast("Обери рахунок"); return; }
  state.syncStatus="loading"; state.syncMsg="Завантаження..."; render();
  try {
    const now = Math.floor(Date.now()/1000);
    const from = now - 30*24*3600;
    const r = await fetch(`https://api.monobank.ua/personal/statement/${state.monoAccount}/${from}/${now}`, {
      headers:{"X-Token": state.monoToken}
    });
    if (r.status===429) throw new Error("Забагато запитів — зачекай хвилину");
    if (!r.ok) throw new Error("Помилка API");
    const txs = await r.json();
    let added = 0;
    txs.forEach(tx => {
      if (tx.amount >= 0) return;
      const id = "mono_"+tx.id;
      if (state.expenses.find(e => e.id===id)) return;
      const amt = Math.abs(tx.amount)/100;
      const date = new Date(tx.time*1000).toISOString().slice(0,10);
      const cat = MCC_MAP[tx.mcc] || "Інше";
      if (!state.expCats.includes(cat)) state.expCats.push(cat);
      state.expenses.unshift({id, amount:amt, desc:tx.description||cat, cat, date, fromMono:true});
      added++;
    });
    state.expenses.sort((a,b) => b.date.localeCompare(a.date));
    state.monoLastSync = now;
    await saveToCloud();
    state.syncStatus="ok";
    state.syncMsg = added>0 ? `✅ Додано ${added} з ${txs.length} транзакцій`
      : txs.length>0 ? `✅ Всі ${txs.length} вже є` : `✅ API повернув 0 транзакцій`;
    render();
    toast(state.syncMsg);
  } catch(e) {
    state.syncStatus="err"; state.syncMsg="❌ "+e.message; render();
  }
};

// ── Charts ─────────────────────────────────────────────────
function pieChartSVG(data, size=130) {
  if (!data.length) return '<p style="color:var(--text2);font-size:13px;text-align:center;padding:20px 0">Немає даних</p>';
  const cx=size/2, cy=size/2, r=size/2-8, total=data.reduce((s,d)=>s+d.amount,0);
  let angle=-Math.PI/2, paths="";
  data.forEach(d => {
    const sweep=(d.amount/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${sweep>Math.PI?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${d.color}" stroke="#0f0f1a" stroke-width="2"/>`;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}</svg>`;
}

function barChartSVG(fExp, fInc) {
  const byDay={};
  fExp.forEach(e=>{byDay[e.date]=byDay[e.date]||{exp:0,inc:0};byDay[e.date].exp+=e.amount;});
  fInc.forEach(e=>{byDay[e.date]=byDay[e.date]||{exp:0,inc:0};byDay[e.date].inc+=e.amount;});
  const sorted=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);
  if (!sorted.length) return "";
  const w=340,h=100,pad=20,max=Math.max(...sorted.flatMap(([,v])=>[v.exp,v.inc]),1);
  const slot=(w-pad*2)/sorted.length, bw=Math.min(10,slot/2-1);
  let bars="";
  sorted.forEach(([date,v],i)=>{
    const x=pad+i*slot+slot/2;
    const hI=Math.round((v.inc/max)*h), hE=Math.round((v.exp/max)*h);
    bars+=`<rect x="${(x-bw-1).toFixed(1)}" y="${(h-hI+4).toFixed(1)}" width="${bw}" height="${hI}" rx="2" fill="#1D9E75" opacity=".85"/>`;
    bars+=`<rect x="${(x+1).toFixed(1)}" y="${(h-hE+4).toFixed(1)}" width="${bw}" height="${hE}" rx="2" fill="#7F77DD" opacity=".85"/>`;
    bars+=`<text x="${x.toFixed(1)}" y="${h+18}" text-anchor="middle" font-size="9" fill="#9090b0">${date.slice(5)}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h+24}" width="100%" style="display:block">${bars}</svg>`;
}

function byCatData(list, cats, cols) {
  return cats.map((cat,i)=>({
    cat, color:cols[i%cols.length],
    amount:list.filter(e=>e.cat===cat).reduce((s,e)=>s+e.amount,0)
  })).filter(d=>d.amount>0).sort((a,b)=>b.amount-a.amount);
}

      const ci=cats.indexOf(e.cat), col=cols[ci>=0?ci%cols.length:cols.length-1];
      return `<div class="entry">
        <span class="dot" style="background:${col}"></span>
        <div class="entry-info">
          <div class="entry-name">${e.desc||e.cat}${e.fromMono?'<span style="font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--text2);margin-left:4px">mono</span>':''}</div>
          <div class="entry-sub">${e.cat} · ${e.date}</div>
        </div>
        <span class="entry-amt" style="color:${isI?"var(--green)":"var(--purple)"}">${isI?"+":"-"}₴${fmt(e.amount)}</span>
        <button class="del-btn" onclick="delEntry('${e.id}','${e._t}')">×</button>
      </div>`;
    }).join("")||`<div class="empty">Немає записів</div>`;
    return `<div class="filters">
      <select onchange="state.histType=this.value;state.filterCat='Всі';render()">
        <option value="all"${ht==="all"?" selected":""}>Всі</option>
        <option value="income"${ht==="income"?" selected":""}>Доходи</option>
        <option value="expense"${ht==="expense"?" selected":""}>Витрати</option>
      </select>
      <select onchange="state.filterMonth=this.value;render()"><option value="">Всі місяці</option>${monthOpts}</select>
    </div>${rows}`;
  },

  categories() {
    return [
      {label:"💰 Джерела доходів",t:"income",cats:state.incCats,cols:ICOLS},
      {label:"💸 Категорії витрат",t:"expense",cats:state.expCats,cols:ECOLS},
    ].map(({label,t,cats,cols})=>`
    <div class="card">
      <div style="font-weight:600;font-size:15px;margin-bottom:12px">${label}</div>
      <div class="chips">${cats.map((c,i)=>`<div class="chip">
        <span class="cdot" style="background:${cols[i%cols.length]}"></span>
        <span>${c}</span>
        <button class="cx" onclick="delCat('${c}','${t}')">×</button>
      </div>`).join("")}</div>
      <div class="add-row">
        <input id="nc-${t}" placeholder="Нова ${t==="income"?"джерело":"категорія"}..." onkeydown="if(event.key==='Enter')addCat('${t}')"/>
        <button onclick="addCat('${t}')">+</button>
      </div>
    </div>`).join("");
  }
};

// ── Render ─────────────────────────────────────────────────
window.render = function() {
  const app = document.getElementById("app");
  const nav = document.getElementById("mainnav");
  if (!uid) {
    app.innerHTML = loginScreen();
    nav.style.display = "none";
    return;
  }
  nav.style.display = "flex";
  app.innerHTML = views[state.tab] ? views[state.tab]() : "";
  ["dashboard","add","history","categories"].forEach(t => {
    const b = document.getElementById("nav-"+t);
    if (b) b.classList.toggle("active", state.tab===t);
  });
};

window.setTab = t => { state.tab=t; render(); };

// ── Actions ────────────────────────────────────────────────
window.saveMonoToken = saveMonoToken;
window.saveToCloud = saveToCloud;

window.addEntry = async () => {
  const f=state.form, t=state.addType;
  const amt=parseFloat(f.amount);
  if (!f.amount||!f.cat||!f.date||isNaN(amt)||amt<=0) { toast("Заповни всі поля ✏️"); return; }
  const entry={id:Date.now(),amount:amt,desc:f.desc,cat:f.cat,date:f.date};
  if (t==="expense") state.expenses.unshift(entry);
  else state.incomes.unshift(entry);
  state.form={amount:"",desc:"",cat:"",date:todayStr()};
  await saveToCloud();
  render();
  toast(t==="income"?"Дохід додано 💰":"Витрату додано 💸");
};

window.delEntry = async (id, t) => {
  if (t==="expense") state.expenses=state.expenses.filter(e=>String(e.id)!==String(id));
  else state.incomes=state.incomes.filter(e=>String(e.id)!==String(id));
  await saveToCloud();
  render();
};

window.addCat = async (t) => {
  const el=document.getElementById("nc-"+t);
  const c=el?.value.trim(); if (!c) return;
  if (t==="expense"&&!state.expCats.includes(c)) state.expCats.push(c);
  if (t==="income"&&!state.incCats.includes(c)) state.incCats.push(c);
  await saveToCloud(); render();
};

window.delCat = async (c, t) => {
  if (t==="expense") { state.expCats=state.expCats.filter(x=>x!==c); state.expenses=state.expenses.map(e=>e.cat===c?{...e,cat:"Інше"}:e); }
  else { state.incCats=state.incCats.filter(x=>x!==c); state.incomes=state.incomes.map(e=>e.cat===c?{...e,cat:"Інше"}:e); }
  await saveToCloud(); render();
};

window.toast = function(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
};

// ── PWA ────────────────────────────────────────────────────
const manifest={name:"Мої фінанси",short_name:"Фінанси",start_url:".",display:"standalone",background_color:"#0f0f1a",theme_color:"#1a1a2e",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text y='.9em' font-size='72' x='12'>💸</text></svg>",sizes:"any",type:"image/svg+xml"}]};
document.getElementById("manifestLink").href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/json"}));
if("serviceWorker"in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response(''))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
}

render();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#252540;
  --text:#e8e8f0;--text2:#9090b0;--border:#2a2a45;
  --green:#1D9E75;--purple:#7F77DD;--red:#E24B4A;--orange:#D85A30;
  --radius:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;padding-bottom:80px}
input,select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-family:var(--font);padding:10px 12px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--purple)}
select option{background:var(--bg2)}
button{cursor:pointer;font-family:var(--font);font-size:14px;border:none;border-radius:8px;transition:opacity .15s}
button:active{opacity:.7}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;color:var(--text2);padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;border-radius:0}
nav button.active{color:var(--purple)}
nav button svg{width:22px;height:22px}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:19px;font-weight:600}
.wrap{max-width:600px;margin:0 auto;padding:16px}
.toggle{display:flex;gap:8px;margin-bottom:18px}
.toggle button{flex:1;padding:10px;font-weight:500;font-size:14px;border:1px solid var(--border);background:var(--bg3);color:var(--text2)}
.toggle button.inc.active{background:var(--green);color:#fff;border-color:var(--green)}
.toggle button.exp.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 10px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-val{font-size:16px;font-weight:600}
.entry{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-right:10px}
.entry-info{flex:1;min-width:0}
.entry-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-sub{font-size:11px;color:var(--text2);margin-top:2px}
.entry-amt{font-weight:600;font-size:15px;margin-right:10px;white-space:nowrap}
.del-btn{background:none;border:none;color:var(--text2);font-size:20px;padding:0;line-height:1;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:13px}
.chip .cdot{width:7px;height:7px;border-radius:50%}
.chip .cx{background:none;border:none;color:var(--text2);font-size:15px;padding:0;margin-left:2px}
.sec{font-size:12px;font-weight:600;color:var(--text2);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.add-row{display:flex;gap:8px}
.add-row input{flex:1}
.add-row button{padding:0 16px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:20px;border-radius:8px}
.submit{width:100%;padding:13px;font-size:15px;font-weight:600;margin-top:6px;color:#fff}
.submit.inc{background:var(--green)}
.submit.exp{background:var(--purple)}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters select{flex:1;min-width:120px}
.empty{text-align:center;color:var(--text2);padding:40px 20px;font-size:14px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:200}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <h1>💸 Мої фінанси</h1>
  <button onclick="setTab('sync')" style="background:var(--orange);color:#fff;padding:6px 12px;font-size:13px;font-weight:600">Mono</button>
</header>
<div class="wrap" id="app"><div class="empty">Завантаження...</div></div>

  </button>
  <button onclick="setTab('add')" id="nav-add">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>

  </button>
  <button onclick="setTab('history')" id="nav-history">

  </button>
  <button onclick="setTab('categories')" id="nav-categories">

  </button>
</nav>
<div id="toast"></div>
</body>
</html>
